services:
  - type: web
    name: nexus-ai-api
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: VAPI_API_KEY
        sync: false
