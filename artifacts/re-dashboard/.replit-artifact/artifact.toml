kind = "web"
previewPath = "/"
title = "Real Estate Call Dashboard"
version = "1.0.0"
id = "artifacts/re-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22062

[services.development]
run = "pnpm --filter @workspace/re-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/re-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/re-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22062"
BASE_PATH = "/"
